info:
  name: Get Channels a User is Subscribed To
  type: http
  seq: 3

http:
  method: GET
  url: "{{server}}/subscription/{{base64ChannelId}}/channels?page=1&limit=4"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "4"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

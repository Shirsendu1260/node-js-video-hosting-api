info:
  name: Create a Playlist
  type: http
  seq: 1

http:
  method: POST
  url: "{{server}}/playlist/create"
  body:
    type: json
    data: |-
      {
          "name": "My Playlist 03",
          "description": "Demo playlist new description"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

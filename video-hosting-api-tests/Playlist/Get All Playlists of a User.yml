info:
  name: Get All Playlists of a User
  type: http
  seq: 2

http:
  method: GET
  url: "{{server}}/playlist/all/{{base64UserId}}?page=1&limit=4&sortType=-1"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "4"
      type: query
    - name: sortType
      value: "-1"
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

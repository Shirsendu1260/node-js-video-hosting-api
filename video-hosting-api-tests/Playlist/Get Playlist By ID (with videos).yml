info:
  name: Get Playlist By ID (with videos)
  type: http
  seq: 3

http:
  method: GET
  url: "{{server}}/playlist/{{base64PlaylistId}}?page=1&limit=4"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "4"
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

info:
  name: Toggle Like/Dislike on a Comment
  type: http
  seq: 3

http:
  method: POST
  url: "{{server}}/like/comment/{{base64ParentCommentId}}"
  body:
    type: json
    data: |-
      {
          "action": "like"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

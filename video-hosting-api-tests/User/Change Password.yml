info:
  name: Change Password
  type: http
  seq: 4

http:
  method: PATCH
  url: "{{server}}/user/change-password"
  body:
    type: json
    data: |-
      {
        "oldPassword": "{{testPassword}}",
        "newPassword": "{{newTestPassword}}",
        "confirmedPassword": "{{newTestPassword}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

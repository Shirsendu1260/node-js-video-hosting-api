info:
  name: Update Report Status (Admin Only)
  type: http
  seq: 3

http:
  method: PATCH
  url: "{{server}}/report/status/{{base64ReportId}}"
  body:
    type: json
    data: |-
      {
          "status": "RES"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

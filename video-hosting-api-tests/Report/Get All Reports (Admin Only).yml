info:
  name: Get All Reports (Admin Only)
  type: http
  seq: 2

http:
  method: GET
  url: "{{server}}/report/all?page=1&limit=4"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "4"
      type: query
    - name: status
      value: RES
      type: query
      disabled: true
    - name: targetModel
      value: Comment
      type: query
      disabled: true
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
